<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-label="ILIOS Never Enough logo">
  <defs>
    <filter id="redGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0 0 0 .04 0 0 0 0 .06 0 0 0 .9 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softWhite" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="redI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3538"/>
      <stop offset=".45" stop-color="#f71925"/>
      <stop offset="1" stop-color="#b80009"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="transparent"/>
  <g transform="translate(0,-4)">
    <path filter="url(#redGlow)" fill="url(#redI)" d="M590 80h220v104h-64v314h64v104H590V498h64V184h-64z"/>
    <g filter="url(#softWhite)" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-weight="900">
      <text x="700" y="720" font-size="92" letter-spacing="68" fill="#f4f4f4">ILIOS</text>
      <text x="700" y="824" font-size="44" letter-spacing="42" fill="#f0f0f0">NEVER ENOUGH</text>
    </g>
  </g>
</svg>