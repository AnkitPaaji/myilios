<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="ILIOS Never Enough logo">
  <defs>
    <filter id="redGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 0 0 0 .05 0 0 0 0 .08 0 0 0 .9 0" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="whiteGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="redI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2a2f"/>
      <stop offset=".55" stop-color="#f71925"/>
      <stop offset="1" stop-color="#b90008"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="none"/>
  <g transform="translate(0 -6)">
    <path filter="url(#redGlow)" fill="url(#redI)" d="M508 104h184v92h-54v228h54v92H508v-92h54V196h-54z"/>
    <g filter="url(#whiteGlow)" fill="#f8f8f8" font-family="Arial Black, Impact, sans-serif" font-weight="900" text-anchor="middle">
      <text x="600" y="610" font-size="76" letter-spacing="56">ILIOS</text>
      <text x="600" y="704" font-size="38" letter-spacing="34">NEVER ENOUGH</text>
    </g>
  </g>
</svg>
